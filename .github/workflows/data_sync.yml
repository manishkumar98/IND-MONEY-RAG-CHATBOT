name: Weekly Data Sync & RAG Refresh

on:
  schedule:
    # Runs at 00:00 every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual triggering

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 libcups2 libdrm2 libxkbcommon0 libwayland-client0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Full Sync Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 phase6/automation.py

      - name: Run Evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 phase6/evaluator.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"
          git add phase1/data/raw/ phase2/data/processed/ phase3/data/chroma_db/ phase6/data/eval_reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated weekly data sync [skip ci]" && git push)
